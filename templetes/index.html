<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Hand Draw — Live</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0a0a0a; color:#fff;
    font-family: 'Segoe UI', sans-serif;
    display:flex; flex-direction:column;
    align-items:center; min-height:100vh;
  }

  /* ── Header ── */
  header {
    width:100%; padding:10px 16px;
    background:#111;
    border-bottom:1px solid #222;
    display:flex; align-items:center;
    justify-content:space-between;
  }
  header h1 { font-size:1.1rem; color:#0ff; letter-spacing:2px; }
  #status {
    font-size:0.75rem; padding:4px 10px;
    border-radius:20px; background:#1a1a1a;
    border:1px solid #333;
  }
  #status.live { color:#0f0; border-color:#0f0; }
  #status.off  { color:#f44; border-color:#f44; }

  /* ── Stream ── */
  #stream-wrap {
    width:100%; max-width:960px;
    position:relative; background:#000;
  }
  #stream {
    width:100%; display:block;
    border-bottom:2px solid #222;
  }

  /* ── Controls ── */
  #controls {
    width:100%; max-width:960px;
    padding:12px 10px;
    display:flex; flex-direction:column; gap:10px;
  }

  .row {
    display:flex; flex-wrap:wrap;
    gap:8px; align-items:center;
  }
  .label {
    font-size:0.70rem; color:#888;
    width:100%; margin-bottom:2px;
    text-transform:uppercase; letter-spacing:1px;
  }

  /* Buttons */
  button {
    padding:10px 18px; border:none;
    border-radius:8px; font-size:0.82rem;
    font-weight:600; cursor:pointer;
    transition:all .15s;
    background:#1e1e1e; color:#ccc;
    border:1px solid #333;
  }
  button:hover  { background:#2a2a2a; color:#fff; }
  button.active { background:#0a3d0a; color:#0f0; border-color:#0f0; }
  button.danger { background:#3d0a0a; color:#f55; border-color:#f55; }
  button.purple { background:#2a0a3d; color:#c084fc; border-color:#c084fc; }
  button.cyan   { background:#0a2a3d; color:#0ff; border-color:#0ff; }

  /* Tools row */
  #tool-btns button { min-width:70px; }

  /* Size slider */
  input[type=range] {
    flex:1; min-width:120px; max-width:220px;
    accent-color:#0ff;
  }
  #size-val {
    min-width:28px; text-align:center;
    font-size:0.85rem; color:#0ff;
  }

  /* Dark mode toggle */
  #dark-toggle { min-width:130px; }
  #dark-toggle.active { background:#0a1a3d; color:#0ff; border-color:#0ff; }

  /* Footer */
  footer {
    margin-top:auto; padding:14px;
    font-size:0.65rem; color:#333;
    text-align:center;
  }

  /* Mobile tweaks */
  @media (max-width:500px) {
    button { padding:9px 12px; font-size:0.76rem; }
    header h1 { font-size:0.95rem; }
  }
</style>
</head>
<body>

<header>
  <h1>✋ Hand Draw Live</h1>
  <span id="status" class="off">● Connecting…</span>
</header>

<div id="stream-wrap">
  <img id="stream" src="/video" alt="Live Stream"
       onload="setStatus(true)" onerror="setStatus(false)">
</div>

<div id="controls">

  <!-- Tools -->
  <div class="row">
    <span class="label">🖊 Tool</span>
  </div>
  <div class="row" id="tool-btns">
    <button onclick="setTool('brush')"    id="t-brush"    class="active">Brush</button>
    <button onclick="setTool('eraser')"   id="t-eraser">Eraser</button>
    <button onclick="setTool('line')"     id="t-line">Line</button>
    <button onclick="setTool('rect')"     id="t-rect">Rect</button>
    <button onclick="setTool('circle')"   id="t-circle">Circle</button>
    <button onclick="setTool('triangle')" id="t-triangle">Triangle</button>
  </div>

  <!-- Brush size -->
  <div class="row">
    <span class="label">📏 Brush Size</span>
  </div>
  <div class="row">
    <input type="range" id="size-slider" min="2" max="30" value="8"
           oninput="setSize(this.value)">
    <span id="size-val">8</span>
  </div>

  <!-- Actions -->
  <div class="row">
    <span class="label">⚡ Actions</span>
  </div>
  <div class="row">
    <button class="purple" onclick="doUndo()">↩ Undo</button>
    <button class="danger" onclick="doClear()">🗑 Clear</button>
    <button class="cyan"   onclick="doSave()">💾 Save</button>
    <button id="dark-toggle" class="active" onclick="toggleDark()">🌑 Neon Mode</button>
  </div>

</div>

<footer>
  Point your finger at the camera to draw • Pinch to place shapes<br>
  Use this page from any device on the same WiFi
</footer>

<script>
  let darkMode   = true;
  let currentTool= "brush";

  function setStatus(ok) {
    const el = document.getElementById('status');
    el.textContent = ok ? '● Live' : '● Offline';
    el.className   = ok ? 'live'   : 'off';
  }

  // Reconnect stream if it drops
  const img = document.getElementById('stream');
  setInterval(() => {
    if (!img.complete || img.naturalWidth === 0) {
      img.src = '/video?' + Date.now();
    }
  }, 3000);

  function post(data) {
    fetch('/control', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(data)
    });
  }

  function setTool(tool) {
    currentTool = tool;
    document.querySelectorAll('#tool-btns button')
      .forEach(b => b.classList.remove('active'));
    document.getElementById('t-'+tool).classList.add('active');
    post({tool});
  }

  function setSize(v) {
    document.getElementById('size-val').textContent = v;
    post({brush_size: parseInt(v)});
  }

  function toggleDark() {
    darkMode = !darkMode;
    const btn = document.getElementById('dark-toggle');
    btn.textContent  = darkMode ? '🌑 Neon Mode' : '☀️ Camera Mode';
    btn.classList.toggle('active', darkMode);
    post({dark_mode: darkMode});
  }

  function doUndo()  { post({undo:true}); }
  function doClear() {
    if (confirm('Clear the canvas?')) post({clear:true});
  }
  function doSave()  {
    fetch('/save',{method:'POST'})
      .then(r=>r.json())
      .then(d=> alert(d.ok ? '✅ Saved: '+d.filename : '❌ Save failed'));
  }
</script>
</body>
</html>
